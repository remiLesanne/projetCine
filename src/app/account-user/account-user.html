<div class="account-container">
  @if (user.id) {
  <div class="account-card">

    <!-- Header -->
    <div class="account-header">
      <div class="account-header-left">
        <div class="avatar">
          {{ user.firstName?.charAt(0) | uppercase }}{{ user.lastName?.charAt(0) | uppercase }}
        </div>
        <div class="user-identity">
          <span class="role">Membre</span>
          <h1 class="name">{{ user.firstName }} {{ user.lastName }}</h1>
          <span class="email">{{ user.email }}</span>
        </div>
      </div>

      <div class="account-header-right">
        <div class="points-value">
          {{ user.points }}<small>pts</small>
        </div>
        <div class="points-label">Fidélité</div>
      </div>
    </div>

    <!-- Body / Form -->
    <div class="account-body">
      <h5 class="account-body__title">
        <i class="bi bi-person-lines-fill"></i>
        Informations personnelles
      </h5>

      <form class="form-grid">

        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input type="text" class="form-control" [(ngModel)]="user.firstName" name="firstName"
            placeholder="Votre prénom">
        </div>

        <div class="form-group">
          <label class="form-label">Nom</label>
          <input type="text" class="form-control" [(ngModel)]="user.lastName" name="lastName" placeholder="Votre nom">
        </div>

        <div class="form-group form-group--full">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="user.email" name="email" placeholder="votre@email.com">
        </div>

        <div class="form-group">
          <label class="form-label">Âge</label>
          <input type="number" class="form-control" [(ngModel)]="user.age" name="age" placeholder="Votre âge">
        </div>

        <div class="form-group">
          <label class="form-label">Points fidélité</label>
          <input type="text" class="form-control" [(ngModel)]="user.points" name="points" readonly>
        </div>

        <div class="form-actions">
          <a routerLink="/movies" class="btn btn--secondary">
            Annuler
          </a>
          <button type="button" class="btn btn--primary" (click)="updateUser()">
            <i class="bi bi-save"></i>
            Sauvegarder
          </button>
        </div>
      </form>
    </div>

  </div>
  }
</div>
