<!-- account-user.html -->
<div>

  <!-- Header -->
  <div>
    <div>
      <div>
        <div>
          <div>
            <span>
              {{ user.firstName?.charAt(0) }}{{ user.lastName?.charAt(0) }}
            </span>
          </div>

          <div>
            <p>Membre</p>
            <h1>{{ user.firstName }} {{ user.lastName }}</h1>
            <p>{{ user.email }}</p>
          </div>

          <div>
            <div>
              <span>{{ user.points }}</span>
              <span>pts</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Form Section -->
  <div>
    <div>
      <div>

        <div>
          <div>
            <h5>Informations personnelles</h5>
          </div>

          <div>
            <form>
              
              <div>
                <label>Prénom</label>
                <input type="text"
                       [(ngModel)]="user.firstName"
                       name="firstName"
                       placeholder="Votre prénom">
              </div>

              <div>
                <label>Nom</label>
                <input type="text"
                       [(ngModel)]="user.lastName"
                       name="lastName"
                       placeholder="Votre nom">
              </div>

              <div>
                <label>Âge</label>
                <input type="number"
                       [(ngModel)]="user.age"
                       name="age"
                       placeholder="Votre âge">
              </div>

              <div>
                <label>Email</label>
                <input type="email"
                       [(ngModel)]="user.email"
                       name="email"
                       placeholder="votre@email.com">
              </div>

              <div>
                <label>Points fidélité</label>
                <input type="text"
                       [(ngModel)]="user.points"
                       name="points"
                       placeholder="0"
                       readonly>
              </div>

              <div>
                <button type="button" (click)="updateUser()">
                  Sauvegarder
                </button>

                <a routerLink="/movies">
                  Annuler
                </a>
              </div>

            </form>
          </div>

        </div>

      </div>
    </div>
  </div>

</div>
