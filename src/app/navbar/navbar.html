<nav [class.nav-hidden]="hidden" class="navbar navbar-light navbar-expand bg-light px-4 sticky-top shadow-sm">
  <!-- Gauche : image + titre -->
  <a class="navbar-brand d-flex align-items-center gap-3 mb-0" routerLink="/">
    <img src="/remi/remi.png" alt="la grosse tête de Rémi" width="60" height="60" class="rounded-3" />
    <span class="fw-semibold">{{ title() | titlecase }}</span>
  </a>

  <!-- Droite : liens -->
  <div class="navbar-nav ms-auto align-items-center">
    <a class="nav-link" routerLink="/" routerLinkActive="active fw-semibold">
      Accueil
    </a>
    <a class="nav-link ms-3" routerLink="/movies" routerLinkActive="active fw-semibold">
      Gestion de films
    </a>

    <a class="nav-link ms-3" routerLink="/admin" routerLinkActive="active fw-semibold">
      Admin
    </a>

    <!-- Authentification : conditionnel -->
    @if (auth.isLoggedIn()) {
    <a class="nav-link ms-3" [routerLink]="['/account', auth.currentUser()!.id]" routerLinkActive="active fw-semibold">
      <i class="bi bi-person-circle me-1"></i>
      {{ auth.currentUser()!.firstName }}
    </a>
    <button class="btn btn-outline-danger btn-sm ms-3" (click)="logout()">
      <i class="bi bi-box-arrow-right me-1"></i>
      Déconnexion
    </button>
    } @else {
    <a class="nav-link ms-3" routerLink="/connexion" routerLinkActive="active fw-semibold">
      <i class="bi bi-box-arrow-in-right me-1"></i>
      Se connecter
    </a>
    <a class="nav-link ms-2" routerLink="/inscription" routerLinkActive="active fw-semibold">
      S'inscrire
    </a>
    }

  </div>
</nav>
