<h1>Connexion</h1>

<div class="d-flex flex-column w-50 gap-3">

  <form #form="ngForm" (ngSubmit)="onSubmit(form)">

    <!-- Email -->
    <div class="d-flex flex-column">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        placeholder="prenom.nom@allocine.com"
        [(ngModel)]="emailUser"
        #emailCtrl="ngModel"
        required />
    </div>

    <!-- Mot de passe -->
    <div class="d-flex flex-column">
      <label for="password">Mot de passe</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-control"
        [(ngModel)]="password"
        #passwordCtrl="ngModel"
        required />
    </div>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="form.invalid">
      Se connecter
    </button>

  </form>

</div>
