<h1>Connexion</h1>

<div class="d-flex flex-column w-50 gap-3">


    <!-- Email -->
    <div class="d-flex flex-column">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        placeholder="prenom.nom@allocine.com"
        [(ngModel)]="emailUser"
        #emailCtrl="ngModel" />
    </div>

    <!-- Mot de passe -->
    <div class="d-flex flex-column">
      <label for="password">Mot de passe</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-control"
        [(ngModel)]="password"
        #passwordCtrl="ngModel" />
    </div>

    <button
      type="submit"
      (click)="connexion()"
      class="btn btn-primary">
      Se connecter
    </button>


</div>
