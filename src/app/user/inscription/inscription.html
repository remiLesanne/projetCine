<h1>Ajout d'un utilisateur</h1>

<div class="d-flex flex-column w-50 gap-3">

  <!-- Prénom -->
  <div class="d-flex flex-column">
    <label for="firstName">Prénom</label>
    <input
      type="text"
      id="firstName"
      name="firstName"
      class="form-control"
      [(ngModel)]="user().firstName" />
  </div>

  <!-- Nom -->
  <div class="d-flex flex-column">
    <label for="lastName">Nom</label>
    <input
      type="text"
      id="lastName"
      name="lastName"
      class="form-control"
      [(ngModel)]="user().lastName" />
  </div>

  <!-- Âge -->
  <div class="d-flex flex-column">
    <label for="age">Âge</label>
    <input
      type="number"
      id="age"
      name="age"
      class="form-control"
      [(ngModel)]="user().age" />
  </div>

  <!-- Email -->
  <div class="d-flex flex-column">
    <label for="email">Email</label>
    <input
      type="email"
      id="email"
      name="email"
      class="form-control"
      [(ngModel)]="user().email" />
  </div>

  <button class="btn btn-warning" (click)="addUser()">Ajouter</button>

</div>
