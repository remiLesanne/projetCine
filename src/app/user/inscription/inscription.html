<div class="account-container">
  <div class="account-card">

    <!-- Header -->
    <div class="account-header">
      <div class="account-header-left">
        <div class="avatar">
          <i class="bi bi-person-plus-fill"></i>
        </div>
        <div class="user-identity">
          <span class="role">Bienvenue</span>
          <h1 class="name">Créer un compte</h1>
          <span class="email">Rejoignez la communauté CinéApp</span>
        </div>
      </div>
    </div>

    <!-- Body / Form -->
    <div class="account-body">
      <h5 class="account-body__title">
        <i class="bi bi-person-lines-fill"></i>
        Informations personnelles
      </h5>

      <form class="form-grid">

        <div class="form-group">
          <label class="form-label">Prénom</label>
          <input type="text" class="form-control" [(ngModel)]="user().firstName" name="firstName"
            placeholder="Votre prénom">
        </div>

        <div class="form-group">
          <label class="form-label">Nom</label>
          <input type="text" class="form-control" [(ngModel)]="user().lastName" name="lastName"
            placeholder="Votre nom">
        </div>

        <div class="form-group form-group--full">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="user().email" name="email"
            placeholder="votre@email.com">
        </div>

        <div class="form-group">
          <label class="form-label">Âge</label>
          <input type="number" class="form-control" [(ngModel)]="user().age" name="age"
            placeholder="Votre âge">
        </div>

        <div class="form-actions">
          <a routerLink="/connexion" class="btn btn--secondary">
            Déjà inscrit ?
          </a>
          <button type="button" class="btn btn--primary" (click)="addUser()">
            <i class="bi bi-person-check"></i>
            S'inscrire
          </button>
        </div>
      </form>
    </div>

  </div>
</div>
